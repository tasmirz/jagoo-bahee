services:
  mongo:
    image: mongo:6
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mcaptcha:
    image: mcaptcha/mcaptcha:latest
    ports:
      - "7000:7000"
    environment:
      MCAPTCHA_PORT: "7000"
      MCAPTCHA_ALLOW_REGISTRATION: "true"
      MCAPTCHA_DATABASE_URL: "sqlite://:memory:"
    restart: unless-stopped
    depends_on:
      - redis

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped

  audit-service:
    build:
      context: ./audit-service
    ports:
      - "6100:6100"
    environment:
      AUDIT_SERVICE_PORT: "6100"
      AUDIT_STORE_PATH: "/data/receipts.json"
    volumes:
      - audit_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  minio_data:
  audit_data:
